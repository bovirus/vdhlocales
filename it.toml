landing_faq_items_0_question = "Cos'è Video Download Helper?"
landing_faq_items_0_answer = "Video Download Helper è un'estensione del browser che ti consente di rilevare e scaricare contenuti video e audio da molti siti web direttamente dal browser."
landing_faq_items_1_question = "Video Download Helper è gratuito?"
landing_faq_items_1_answer = "Sì, e rimarrà gratuito. Puoi installare e usare Video Download Helper gratuitamente, senza limiti di tempo. La versione gratuita ti consente già di scaricare video da migliaia di siti web e di usare tutte le funzioni principali. Per la maggior parte degli utenti, la versione gratuita è più che sufficiente per i download quotidiani. Se hai bisogno di funzionalità avanzate e download illimitati, puoi acquistare una licenza Premium con un singolo pagamento."
landing_faq_items_2_question = "Con quali browser posso usare Video Download Helper?"
landing_faq_items_2_answer = "Video Download Helper è disponibile per Google Chrome, Firefox e Microsoft Edge. Puoi installarlo direttamente dagli store ufficiali dei browser. Se hai una licenza Premium, funziona su tutti i browser."
landing_faq_items_3_question = "Che tipi di video posso scaricare?"
landing_faq_items_3_answer = "Video Download Helper rileva e scarica la maggior parte dei formati video web: video MP4 standard, formati di streaming (HLS, DASH), video incorporati su migliaia di siti e flussi audio (MP3 e altri). Funziona su social media, siti educativi, siti di notizie, servizi di streaming e molte altre piattaforme. L'estensione rileva automaticamente i media disponibili quando visiti una pagina."
landing_faq_items_4_question = "Video Download Helper è sicuro?"
landing_faq_items_4_answer = "Lavoriamo duramente per rendere Video Download Helper sicuro per i nostri utenti: disponibile sugli store ufficiali (Chrome Web Store, Firefox Add-ons), utilizzato da milioni di utenti in tutto il mondo, nessuno spyware, nessuna rivendita di dati, aggiornato e mantenuto regolarmente. Video Download Helper è sviluppato da quasi 20 anni ed è apprezzato. La tua privacy e la tua sicurezza sono una priorità."
landing_faq_items_5_question = "Cosa include la versione a pagamento?"
landing_faq_items_5_answer = "La licenza Premium sblocca tutta la potenza di Video Download Helper: rimuove la filigrana dalle conversioni, abilita conversioni video di alta qualità illimitate, elaborazione più rapida, funzionalità di download avanzate, sostiene lo sviluppo continuo. Se scarichi video regolarmente, la licenza si ripaga velocemente."

